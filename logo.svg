<svg width="333" height="96" viewBox="0 0 333 96" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="gNBB" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#00ff9c"/>
    <stop offset="100%" stop-color="#00c853"/>
  </linearGradient>

  <linearGradient id="gWiFiber" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00e5ff"/>
    <stop offset="50%" stop-color="#d500f9"/>
    <stop offset="100%" stop-color="#ffea00"/>
    <animateTransform attributeName="gradientTransform"
      type="translate"
      from="-1 0" to="1 0"
      dur="3s"
      repeatCount="indefinite"/>
  </linearGradient>
</defs>

<!-- Bars Animated -->
<rect x="5" width="8" rx="3" fill="url(#gNBB)">
  <animate attributeName="height" values="20;40;20" dur="1s" repeatCount="indefinite"/>
  <animate attributeName="y" values="60;40;60" dur="1s" repeatCount="indefinite"/>
</rect>

<rect x="18" width="8" rx="3" fill="url(#gNBB)">
  <animate attributeName="height" values="30;50;30" dur="1.2s" repeatCount="indefinite"/>
  <animate attributeName="y" values="50;30;50" dur="1.2s" repeatCount="indefinite"/>
</rect>

<rect x="31" width="8" rx="3" fill="url(#gNBB)">
  <animate attributeName="height" values="40;60;40" dur="1.4s" repeatCount="indefinite"/>
  <animate attributeName="y" values="38;18;38" dur="1.4s" repeatCount="indefinite"/>
</rect>

<rect x="44" width="8" rx="3" fill="url(#gNBB)">
  <animate attributeName="height" values="55;75;55" dur="1.6s" repeatCount="indefinite"/>
  <animate attributeName="y" values="25;5;25" dur="1.6s" repeatCount="indefinite"/>
</rect>

<!-- NBB -->
<text x="65" y="60" font-size="36" font-weight="bold" fill="url(#gNBB)" font-family="Arial">
NBB
</text>

<!-- WiFiber -->
<text x="150" y="60" font-size="32" font-weight="bold" fill="url(#gWiFiber)" font-family="Arial">
WiFiber
</text>

<!-- WiFi Pulse -->
<path d="M260 30 Q280 10 300 30" stroke="#00e5ff" stroke-width="3" fill="none">
  <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
</path>

<path d="M265 35 Q280 20 295 35" stroke="#00e5ff" stroke-width="3" fill="none">
  <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
</path>

<circle cx="280" cy="40" r="3" fill="#00e5ff">
  <animate attributeName="r" values="2;4;2" dur="1s" repeatCount="indefinite"/>
</circle>

</svg>