<svg width="333" height="96" viewBox="0 0 333 96" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Neon Green -->
    <linearGradient id="gNBBd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff9c"/>
      <stop offset="100%" stop-color="#00c853"/>
    </linearGradient>

    <!-- Neon WiFiber -->
    <linearGradient id="gWiFiberd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="25%" stop-color="#2979ff"/>
      <stop offset="50%" stop-color="#d500f9"/>
      <stop offset="75%" stop-color="#ff4081"/>
      <stop offset="100%" stop-color="#ffea00"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="333" height="96" fill="#0a0a0a"/>

  <!-- Bars -->
  <rect x="5" y="60" width="8" height="20" rx="3" fill="url(#gNBBd)" filter="url(#glow)"/>
  <rect x="18" y="50" width="8" height="30" rx="3" fill="url(#gNBBd)" filter="url(#glow)"/>
  <rect x="31" y="38" width="8" height="42" rx="3" fill="url(#gNBBd)" filter="url(#glow)"/>
  <rect x="44" y="25" width="8" height="55" rx="3" fill="url(#gNBBd)" filter="url(#glow)"/>

  <!-- NBB -->
  <text x="65" y="60" font-size="36" font-weight="bold" fill="url(#gNBBd)" font-family="Arial" filter="url(#glow)">
    NBB
  </text>

  <!-- WiFiber -->
  <text x="150" y="60" font-size="32" font-weight="bold" fill="url(#gWiFiberd)" font-family="Arial" filter="url(#glow)">
    WiFiber
  </text>

  <!-- WiFi -->
  <path d="M260 30 Q280 10 300 30" stroke="#00e5ff" stroke-width="3" fill="none"/>
  <path d="M265 35 Q280 20 295 35" stroke="#00e5ff" stroke-width="3" fill="none"/>
  <circle cx="280" cy="40" r="3" fill="#00e5ff"/>

  <!-- Line -->
  <rect x="65" y="70" width="200" height="3" fill="url(#gWiFiberd)"/>

  <!-- Tagline -->
  <text x="65" y="88" font-size="10" fill="#aaa" font-family="Arial" letter-spacing="2">
    NATIONAL BROADBAND
  </text>

  <!-- Cybernet -->
  <rect x="250" y="70" rx="6" width="75" height="20" fill="#ff1744"/>
  <text x="257" y="85" font-size="11" fill="#fff" font-family="Arial">
    CYBERNET
  </text>

</svg>